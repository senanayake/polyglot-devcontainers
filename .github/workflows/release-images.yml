name: release-images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: maintainer
            image_name: polyglot-devcontainers-maintainer
            dockerfile: .devcontainer/Containerfile
            context: .
            workdir: /workspaces/polyglot-devcontainers
            description: Maintainer and CI validation container for polyglot-devcontainers.
          - name: java
            image_name: polyglot-devcontainers-java
            dockerfile: templates/java-secure/.devcontainer/Containerfile
            context: templates/java-secure
            workdir: /workspaces/polyglot-devcontainers/templates/java-secure
            description: Gradle-first Java engineering container for polyglot-devcontainers.
          - name: python-node
            image_name: polyglot-devcontainers-python-node
            dockerfile: templates/python-node-secure/.devcontainer/Containerfile
            context: templates/python-node-secure
            workdir: /workspaces/polyglot-devcontainers/templates/python-node-secure
            description: Focused Python and Node / TypeScript polyglot container for polyglot-devcontainers.

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=main,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=${{ matrix.image_name }}

      - name: Build image for validation
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ matrix.image_name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate image devcontainer metadata
        run: |
          case "${{ matrix.name }}" in
            maintainer)
              devcontainer_json=".devcontainer/devcontainer.json"
              ;;
            java)
              devcontainer_json="templates/java-secure/.devcontainer/devcontainer.json"
              ;;
            python-node)
              devcontainer_json="templates/python-node-secure/.devcontainer/devcontainer.json"
              ;;
            *)
              echo "Unsupported image matrix entry: ${{ matrix.name }}" >&2
              exit 1
              ;;
          esac
          python3 scripts/validate_devcontainer_metadata.py \
            --image "${{ matrix.image_name }}:ci" \
            --devcontainer-json "${devcontainer_json}"

      - name: Run task ci inside built image
        run: |
          docker run --rm \
            -u root \
            -v "${{ github.workspace }}:/workspaces/polyglot-devcontainers" \
            -w "${{ matrix.workdir }}" \
            "${{ matrix.image_name }}:ci" \
            bash -lc "git config --global --add safe.directory /workspaces/polyglot-devcontainers && task ci"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Scan published image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}
          scan-type: image
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan published image with Trivy (JSON)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}
          scan-type: image
          format: json
          output: trivy-${{ matrix.name }}.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          skip-setup-trivy: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles(format('trivy-{0}.sarif', matrix.name)) != '' }}
        with:
          category: trivy-${{ matrix.name }}
          sarif_file: trivy-${{ matrix.name }}.sarif

      - name: Summarize release security results
        if: ${{ always() && hashFiles(format('trivy-{0}.json', matrix.name)) != '' }}
        run: |
          python3 - <<'PY'
          import json
          import textwrap
          import os
          from pathlib import Path

          matrix_name = os.environ["MATRIX_NAME"]
          image_name = os.environ["IMAGE_NAME"]
          image_digest = os.environ["IMAGE_DIGEST"]
          image_ref = f"ghcr.io/{os.environ['GITHUB_REPOSITORY_OWNER']}/{image_name}@{image_digest}"
          report_path = Path(f"trivy-{matrix_name}.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))

          critical = 0
          high = 0
          medium = 0
          low = 0
          unfixed = 0
          fixable = 0
          total = 0
          by_type = {}
          package_counts = {}
          critical_rows = []

          for result in report.get("Results", []):
              result_type = result.get("Type", "unknown")
              for vulnerability in result.get("Vulnerabilities", []) or []:
                  total += 1
                  severity = vulnerability.get("Severity", "").upper()
                  if severity == "CRITICAL":
                      critical += 1
                  elif severity == "HIGH":
                      high += 1
                  elif severity == "MEDIUM":
                      medium += 1
                  elif severity == "LOW":
                      low += 1
                  package_name = vulnerability.get("PkgName") or vulnerability.get("PkgID") or "unknown"
                  package_counts[package_name] = package_counts.get(package_name, 0) + 1
                  by_type[result_type] = by_type.get(
                      result_type,
                      {"total": 0, "critical": 0, "high": 0, "fixable": 0},
                  )
                  by_type[result_type]["total"] += 1
                  if severity == "CRITICAL":
                      by_type[result_type]["critical"] += 1
                  elif severity == "HIGH":
                      by_type[result_type]["high"] += 1

                  fixed_version = vulnerability.get("FixedVersion")
                  if not fixed_version:
                      unfixed += 1
                  else:
                      fixable += 1

                  if severity == "CRITICAL":
                      critical_rows.append(
                          {
                              "vulnerability_id": vulnerability.get("VulnerabilityID", "unknown"),
                              "package_name": package_name,
                              "installed_version": vulnerability.get("InstalledVersion", "unknown"),
                              "fixed_version": fixed_version or "none",
                              "type": result_type,
                              "title": (vulnerability.get("Title") or "").strip(),
                          }
                      )

          top_packages = sorted(package_counts.items(), key=lambda item: (-item[1], item[0]))[:10]
          critical_rows = sorted(
              critical_rows,
              key=lambda item: (item["fixed_version"] == "none", item["package_name"], item["vulnerability_id"]),
          )
          summary_markdown = Path(f"trivy-{matrix_name}-summary.md")

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as handle, summary_markdown.open("w", encoding="utf-8") as report_handle:
              def write(line: str = "") -> None:
                  handle.write(line + "\n")
                  report_handle.write(line + "\n")

              write(f"### Release Security Summary: {matrix_name}")
              write("")
              write(f"- Image: `{image_ref}`")
              write(f"- SBOM: `sbom-{matrix_name}.spdx.json`")
              write(f"- Trivy SARIF: `trivy-{matrix_name}.sarif`")
              write(f"- Trivy JSON: `trivy-{matrix_name}.json`")
              write("")
              write("| Severity | Count |")
              write("| --- | ---: |")
              write(f"| Critical | {critical} |")
              write(f"| High | {high} |")
              write(f"| Medium | {medium} |")
              write(f"| Low | {low} |")
              write(f"| Fixable | {fixable} |")
              write(f"| Unfixed | {unfixed} |")
              write(f"| Total | {total} |")
              write("")

              write("#### By Ecosystem / Scanner Type")
              write("")
              write("| Type | Total | Critical | High | Fixable |")
              write("| --- | ---: | ---: | ---: | ---: |")
              for result_type in sorted(by_type):
                  entry = by_type[result_type]
                  write(
                      f"| `{result_type}` | {entry['total']} | {entry['critical']} | {entry['high']} | {entry['fixable']} |"
                  )
              write("")

              write("#### Top Packages By Finding Count")
              write("")
              write("| Package | Findings |")
              write("| --- | ---: |")
              for package_name, count in top_packages:
                  write(f"| `{package_name}` | {count} |")
              write("")

              write("#### Critical CVEs")
              write("")
              if critical_rows:
                  write("| CVE | Package | Installed | Fixed | Type |")
                  write("| --- | --- | --- | --- | --- |")
                  for row in critical_rows:
                      write(
                          f"| `{row['vulnerability_id']}` | `{row['package_name']}` | `{row['installed_version']}` | `{row['fixed_version']}` | `{row['type']}` |"
                      )
                  write("")
              else:
                  write("No critical CVEs found.")
                  write("")

              remediation_notes = []
              if by_type.get("os-pkgs", {}).get("critical", 0) or by_type.get("os-pkgs", {}).get("high", 0):
                  remediation_notes.append(
                      "Refresh the base image and reduce ad-hoc apt installs first; OS package findings dominate this image."
                  )
              if any(pkg in package_counts for pkg in ("nodejs", "openssl", "libssl3", "glibc", "zlib", "curl")):
                  remediation_notes.append(
                      "Review high-volume core packages such as `nodejs`, `openssl`/`libssl`, `glibc`, `zlib`, and `curl`; these usually move with base image or distro package updates."
                  )
              if critical_rows and any(row["fixed_version"] != "none" for row in critical_rows):
                  remediation_notes.append(
                      "Prioritize critical findings with a non-empty fixed version; those are the fastest path to measurable risk reduction."
                  )
              if not remediation_notes:
                  remediation_notes.append(
                      "Use the top-package and critical-CVE tables above to decide whether the next fix should be a base image refresh, package removal, or language dependency update."
                  )

              write("#### Suggested Remediation Path")
              write("")
              for note in remediation_notes:
                  write(f"- {textwrap.shorten(note, width=180, placeholder='...')}")
              write("")
          PY
        env:
          MATRIX_NAME: ${{ matrix.name }}
          IMAGE_NAME: ${{ matrix.image_name }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}

      - name: Upload release security artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: release-security-${{ matrix.name }}
          path: |
            trivy-${{ matrix.name }}.sarif
            trivy-${{ matrix.name }}.json
            trivy-${{ matrix.name }}-summary.md
            sbom-${{ matrix.name }}.spdx.json
          if-no-files-found: error
