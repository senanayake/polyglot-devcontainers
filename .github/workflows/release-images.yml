name: release-images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write
  security-events: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: maintainer
            image_name: polyglot-devcontainers-maintainer
            dockerfile: .devcontainer/Containerfile
            context: .
            workdir: /workspaces/polyglot-devcontainers
            description: Maintainer and CI validation container for polyglot-devcontainers.
          - name: java
            image_name: polyglot-devcontainers-java
            dockerfile: templates/java-secure/.devcontainer/Containerfile
            context: templates/java-secure
            workdir: /workspaces/polyglot-devcontainers/templates/java-secure
            description: Gradle-first Java engineering container for polyglot-devcontainers.
          - name: python-node
            image_name: polyglot-devcontainers-python-node
            dockerfile: templates/python-node-secure/.devcontainer/Containerfile
            context: templates/python-node-secure
            workdir: /workspaces/polyglot-devcontainers/templates/python-node-secure
            description: Focused Python and Node / TypeScript polyglot container for polyglot-devcontainers.

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=main,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=${{ matrix.image_name }}

      - name: Build image for validation
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          pull: true
          load: true
          push: false
          tags: ${{ matrix.image_name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate image devcontainer metadata
        run: |
          case "${{ matrix.name }}" in
            maintainer)
              devcontainer_json=".devcontainer/devcontainer.json"
              ;;
            java)
              devcontainer_json="templates/java-secure/.devcontainer/devcontainer.json"
              ;;
            python-node)
              devcontainer_json="templates/python-node-secure/.devcontainer/devcontainer.json"
              ;;
            *)
              echo "Unsupported image matrix entry: ${{ matrix.name }}" >&2
              exit 1
              ;;
          esac
          python3 scripts/validate_devcontainer_metadata.py \
            --image "${{ matrix.image_name }}:ci" \
            --devcontainer-json "${devcontainer_json}"

      - name: Bootstrap empty starter workspace
        if: ${{ matrix.name == 'java' || matrix.name == 'python-node' }}
        run: |
          workspace="$(mktemp -d)"
          mkdir -p "${workspace}/.devcontainer"
          chmod -R 0777 "${workspace}"
          cat > "${workspace}/.devcontainer/devcontainer.json" <<'EOF'
          {
            "name": "bootstrap-smoke-test"
          }
          EOF

          docker run --rm \
            -u vscode \
            -v "${workspace}:/workspaces/project" \
            -w /workspaces/project \
            "${{ matrix.image_name }}:ci" \
            bash -lc "task init && test -f Taskfile.yml && test -f .polyglot-bootstrap.json && task ci"

      - name: Run task ci inside built image
        run: |
          docker run --rm \
            -u root \
            -v "${{ github.workspace }}:/workspaces/polyglot-devcontainers" \
            -w "${{ matrix.workdir }}" \
            "${{ matrix.image_name }}:ci" \
            bash -lc "git config --global --add safe.directory /workspaces/polyglot-devcontainers && task ci"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          pull: true
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Scan published image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}
          scan-type: image
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan published image with Trivy (JSON)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}
          scan-type: image
          format: json
          output: trivy-${{ matrix.name }}.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          skip-setup-trivy: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles(format('trivy-{0}.sarif', matrix.name)) != '' }}
        with:
          category: trivy-${{ matrix.name }}
          sarif_file: trivy-${{ matrix.name }}.sarif

      - name: Summarize release security results
        if: ${{ always() && hashFiles(format('trivy-{0}.json', matrix.name)) != '' }}
        run: |
          python3 scripts/summarize_trivy_report.py \
            --report "trivy-${MATRIX_NAME}.json" \
            --image-name "${MATRIX_NAME}" \
            --image-ref "ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}@${IMAGE_DIGEST}" \
            --json-output "trivy-${MATRIX_NAME}-summary.json" \
            --markdown-output "trivy-${MATRIX_NAME}-summary.md"
          cat "trivy-${MATRIX_NAME}-summary.md" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
        env:
          MATRIX_NAME: ${{ matrix.name }}
          IMAGE_NAME: ${{ matrix.image_name }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}

      - name: Upload release security artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: release-security-${{ matrix.name }}
          path: |
            trivy-${{ matrix.name }}.sarif
            trivy-${{ matrix.name }}.json
            trivy-${{ matrix.name }}-summary.json
            trivy-${{ matrix.name }}-summary.md
            sbom-${{ matrix.name }}.spdx.json
          if-no-files-found: error

  publish-release-notes:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists."
          else
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --generate-notes \
              --target "${GITHUB_SHA}"
          fi

  publish-release-security:
    runs-on: ubuntu-latest
    needs:
      - publish
      - publish-release-notes
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download release security artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-security-*
          path: .artifacts/release-assets
          merge-multiple: true

      - name: Build release security reports
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 scripts/build_residual_risk_report.py \
            --report maintainer=.artifacts/release-assets/trivy-maintainer.json \
            --report java=.artifacts/release-assets/trivy-java.json \
            --report python-node=.artifacts/release-assets/trivy-python-node.json \
            --json-output .artifacts/release-assets/release-security-residual-risk.json \
            --markdown-output .artifacts/release-assets/release-security-residual-risk.md
          gh release view "${TAG_NAME}" --json body --jq .body > .artifacts/release-assets/release-notes-existing.md
          python3 scripts/build_release_security_summary.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${TAG_NAME}" \
            --summary maintainer=.artifacts/release-assets/trivy-maintainer-summary.json \
            --summary java=.artifacts/release-assets/trivy-java-summary.json \
            --summary python-node=.artifacts/release-assets/trivy-python-node-summary.json \
            --residual-risk-markdown .artifacts/release-assets/release-security-residual-risk.md \
            --overview-output .artifacts/release-assets/release-security-overview.md \
            --notes-fragment-output .artifacts/release-assets/release-security-notes.md \
            --existing-notes .artifacts/release-assets/release-notes-existing.md \
            --release-notes-output .artifacts/release-assets/release-notes-updated.md

      - name: Stage release security assets
        run: |
          mkdir -p .artifacts/release-assets/upload
          cp .artifacts/release-assets/trivy-maintainer-summary.md .artifacts/release-assets/upload/release-security-maintainer-summary.md
          cp .artifacts/release-assets/trivy-maintainer-summary.json .artifacts/release-assets/upload/release-security-maintainer-summary.json
          cp .artifacts/release-assets/sbom-maintainer.spdx.json .artifacts/release-assets/upload/release-security-maintainer-sbom.spdx.json
          cp .artifacts/release-assets/trivy-java-summary.md .artifacts/release-assets/upload/release-security-java-summary.md
          cp .artifacts/release-assets/trivy-java-summary.json .artifacts/release-assets/upload/release-security-java-summary.json
          cp .artifacts/release-assets/sbom-java.spdx.json .artifacts/release-assets/upload/release-security-java-sbom.spdx.json
          cp .artifacts/release-assets/trivy-python-node-summary.md .artifacts/release-assets/upload/release-security-python-node-summary.md
          cp .artifacts/release-assets/trivy-python-node-summary.json .artifacts/release-assets/upload/release-security-python-node-summary.json
          cp .artifacts/release-assets/sbom-python-node.spdx.json .artifacts/release-assets/upload/release-security-python-node-sbom.spdx.json
          cp .artifacts/release-assets/release-security-overview.md .artifacts/release-assets/upload/release-security-overview.md
          cp .artifacts/release-assets/release-security-residual-risk.md .artifacts/release-assets/upload/release-security-residual-risk.md
          cp .artifacts/release-assets/release-security-residual-risk.json .artifacts/release-assets/upload/release-security-residual-risk.json

      - name: Upload release security assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release upload "${TAG_NAME}" .artifacts/release-assets/upload/* --clobber

      - name: Update release notes with security status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release edit "${TAG_NAME}" --notes-file .artifacts/release-assets/release-notes-updated.md

  update-readme-recent-releases:
    runs-on: ubuntu-latest
    needs: publish-release-security
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Check out default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update recent releases table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/update_recent_releases_table.py \
            --repo "${GITHUB_REPOSITORY}" \
            --readme README.md \
            --limit 5

      - name: Commit README update
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- README.md; then
            echo "README.md already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update recent release links in README"
          git push origin "HEAD:${DEFAULT_BRANCH}"
