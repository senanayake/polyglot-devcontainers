name: release-images

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: Release behavior for a manual run
        required: true
        default: validate-only
        type: choice
        options:
          - validate-only
          - full-release
      release_tag:
        description: Existing vMAJOR.MINOR.PATCH tag to use for full manual releases
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write
  security-events: write
  attestations: write

jobs:
  release-context:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.plan.outputs.checkout_ref }}
      is_full_release: ${{ steps.plan.outputs.is_full_release }}
      push_main_tag: ${{ steps.plan.outputs.push_main_tag }}
      release_mode: ${{ steps.plan.outputs.release_mode }}
      release_sha: ${{ steps.inspect.outputs.release_sha }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
    steps:
      - name: Resolve release context
        id: plan
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_MODE: ${{ inputs.release_mode }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          checkout_ref="${REF_NAME}"
          is_full_release=false
          push_main_tag=false
          release_mode="tag-push"
          release_tag=""

          if [[ "${EVENT_NAME}" == "push" && "${REF}" == refs/tags/* ]]; then
            is_full_release=true
            release_mode="tag-push"
            release_tag="${REF_NAME}"
            checkout_ref="${REF_NAME}"
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_mode="${INPUT_RELEASE_MODE:-validate-only}"

            case "${release_mode}" in
              validate-only)
                ;;
              full-release)
                if [[ -n "${INPUT_RELEASE_TAG:-}" ]]; then
                  release_tag="${INPUT_RELEASE_TAG}"
                elif [[ "${REF}" == refs/tags/* ]]; then
                  release_tag="${REF_NAME}"
                else
                  echo "workflow_dispatch full-release requires release_tag or a tag ref" >&2
                  exit 1
                fi

                if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                  echo "release_tag must match vMAJOR.MINOR.PATCH, got: ${release_tag}" >&2
                  exit 1
                fi

                is_full_release=true
                checkout_ref="${release_tag}"
                ;;
              *)
                echo "Unsupported release_mode: ${release_mode}" >&2
                exit 1
                ;;
            esac
          fi

          if [[ "${is_full_release}" != "true" && "${REF}" == "refs/heads/${DEFAULT_BRANCH}" ]]; then
            push_main_tag=true
          fi

          echo "checkout_ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"
          echo "is_full_release=${is_full_release}" >> "${GITHUB_OUTPUT}"
          echo "push_main_tag=${push_main_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_mode=${release_mode}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Check out resolved ref
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.plan.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Inspect resolved ref
        id: inspect
        env:
          IS_FULL_RELEASE: ${{ steps.plan.outputs.is_full_release }}
          RELEASE_TAG: ${{ steps.plan.outputs.release_tag }}
        run: |
          set -euo pipefail

          release_sha="$(git rev-parse HEAD)"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"

          if [[ "${IS_FULL_RELEASE}" == "true" ]]; then
            tag_sha="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
            if [[ "${tag_sha}" != "${release_sha}" ]]; then
              echo "Resolved ref ${RELEASE_TAG} does not match HEAD ${release_sha}" >&2
              exit 1
            fi
          fi

      - name: Explain manual dispatch scope
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          CHECKOUT_REF: ${{ steps.plan.outputs.checkout_ref }}
          IS_FULL_RELEASE: ${{ steps.plan.outputs.is_full_release }}
          RELEASE_MODE: ${{ steps.plan.outputs.release_mode }}
          RELEASE_TAG: ${{ steps.plan.outputs.release_tag }}
          RELEASE_SHA: ${{ steps.inspect.outputs.release_sha }}
        run: |
          set -euo pipefail

          {
            echo "### Manual release-images run"
            echo ""
            echo "- Selected mode: \`${RELEASE_MODE}\`"
            echo "- Resolved ref: \`${CHECKOUT_REF}\`"
            echo "- Resolved commit: \`${RELEASE_SHA}\`"
            if [[ "${IS_FULL_RELEASE}" == "true" ]]; then
              echo "- Full release enabled for \`${RELEASE_TAG}\`."
              echo "- GitHub Release notes, release security assets, and the README recent releases table will run if the publish matrix succeeds."
            else
              echo "- This run will validate and publish images for the selected ref."
              echo "- GitHub Release notes, release security assets, and the README recent releases table are disabled in \`validate-only\` mode."
              echo "- Use \`release_mode=full-release\` with an existing release tag to run the release-only steps manually."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  publish:
    needs: release-context
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: maintainer
            image_name: polyglot-devcontainers-maintainer
            dockerfile: .devcontainer/Containerfile
            context: .
            workdir: /workspaces/polyglot-devcontainers
            description: Maintainer and CI validation container for polyglot-devcontainers.
          - name: java
            image_name: polyglot-devcontainers-java
            dockerfile: templates/java-secure/.devcontainer/Containerfile
            context: .
            workdir: /workspaces/polyglot-devcontainers/templates/java-secure
            description: Gradle-first Java engineering container for polyglot-devcontainers.
          - name: python-node
            image_name: polyglot-devcontainers-python-node
            dockerfile: templates/python-node-secure/.devcontainer/Containerfile
            context: .
            workdir: /workspaces/polyglot-devcontainers/templates/python-node-secure
            description: Focused Python and Node / TypeScript polyglot container for polyglot-devcontainers.

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-context.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          flavor: |
            latest=false
          tags: |
            type=sha
            type=raw,value=${{ needs.release-context.outputs.release_tag }},enable=${{ needs.release-context.outputs.is_full_release == 'true' }}
            type=raw,value=latest,enable=${{ needs.release-context.outputs.is_full_release == 'true' }}
            type=raw,value=main,enable=${{ needs.release-context.outputs.push_main_tag == 'true' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=${{ matrix.image_name }}

      - name: Build image for validation
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          pull: true
          load: true
          push: false
          tags: ${{ matrix.image_name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate image devcontainer metadata
        run: |
          case "${{ matrix.name }}" in
            maintainer)
              devcontainer_json=".devcontainer/devcontainer.json"
              ;;
            java)
              devcontainer_json="templates/java-secure/.devcontainer/devcontainer.json"
              ;;
            python-node)
              devcontainer_json="templates/python-node-secure/.devcontainer/devcontainer.json"
              ;;
            *)
              echo "Unsupported image matrix entry: ${{ matrix.name }}" >&2
              exit 1
              ;;
          esac
          python3 scripts/validate_devcontainer_metadata.py \
            --image "${{ matrix.image_name }}:ci" \
            --devcontainer-json "${devcontainer_json}"

      - name: Bootstrap empty starter workspace
        if: ${{ matrix.name == 'java' || matrix.name == 'python-node' }}
        run: |
          if [ "${{ matrix.name }}" = "python-node" ]; then
            bash scripts/smoke_test_published_starter.sh --image "${{ matrix.image_name }}:ci" --run-scenarios
          else
            bash scripts/smoke_test_published_starter.sh --image "${{ matrix.image_name }}:ci"
          fi

      - name: Run task ci inside built image
        run: |
          docker run --rm \
            -u root \
            -v "${{ github.workspace }}:/workspaces/polyglot-devcontainers" \
            -w "${{ matrix.workdir }}" \
            "${{ matrix.image_name }}:ci" \
            bash -lc "git config --global --add safe.directory /workspaces/polyglot-devcontainers && man polyglot >/dev/null && man polyglot-scenarios >/dev/null && task ci"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          pull: true
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Scan published image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}
          scan-type: image
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan published image with Trivy (JSON)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}
          scan-type: image
          format: json
          output: trivy-${{ matrix.name }}.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          skip-setup-trivy: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles(format('trivy-{0}.sarif', matrix.name)) != '' }}
        with:
          category: trivy-${{ matrix.name }}
          sarif_file: trivy-${{ matrix.name }}.sarif

      - name: Summarize release security results
        if: ${{ always() && hashFiles(format('trivy-{0}.json', matrix.name)) != '' }}
        run: |
          python3 scripts/summarize_trivy_report.py \
            --report "trivy-${MATRIX_NAME}.json" \
            --image-name "${MATRIX_NAME}" \
            --image-ref "ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}@${IMAGE_DIGEST}" \
            --json-output "trivy-${MATRIX_NAME}-summary.json" \
            --markdown-output "trivy-${MATRIX_NAME}-summary.md"
          cat "trivy-${MATRIX_NAME}-summary.md" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
        env:
          MATRIX_NAME: ${{ matrix.name }}
          IMAGE_NAME: ${{ matrix.image_name }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}

      - name: Upload release security artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: release-security-${{ matrix.name }}
          path: |
            trivy-${{ matrix.name }}.sarif
            trivy-${{ matrix.name }}.json
            trivy-${{ matrix.name }}-summary.json
            trivy-${{ matrix.name }}-summary.md
            sbom-${{ matrix.name }}.spdx.json
          if-no-files-found: error

  publish-release-notes:
    runs-on: ubuntu-latest
    needs:
      - release-context
      - publish
    if: ${{ needs.release-context.outputs.is_full_release == 'true' }}
    steps:
      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.release-context.outputs.release_sha }}
          TAG_NAME: ${{ needs.release-context.outputs.release_tag }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists."
          else
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --generate-notes \
              --target "${RELEASE_SHA}"
          fi

  publish-release-security:
    runs-on: ubuntu-latest
    needs:
      - release-context
      - publish
      - publish-release-notes
    if: ${{ needs.release-context.outputs.is_full_release == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-context.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download release security artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-security-*
          path: .artifacts/release-assets
          merge-multiple: true

      - name: Build release security reports
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.release-context.outputs.release_tag }}
        run: |
          python3 scripts/build_residual_risk_report.py \
            --report maintainer=.artifacts/release-assets/trivy-maintainer.json \
            --report java=.artifacts/release-assets/trivy-java.json \
            --report python-node=.artifacts/release-assets/trivy-python-node.json \
            --json-output .artifacts/release-assets/release-security-residual-risk.json \
            --markdown-output .artifacts/release-assets/release-security-residual-risk.md
          gh release view "${TAG_NAME}" --json body --jq .body > .artifacts/release-assets/release-notes-existing.md
          python3 scripts/build_release_security_summary.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${TAG_NAME}" \
            --summary maintainer=.artifacts/release-assets/trivy-maintainer-summary.json \
            --summary java=.artifacts/release-assets/trivy-java-summary.json \
            --summary python-node=.artifacts/release-assets/trivy-python-node-summary.json \
            --residual-risk-markdown .artifacts/release-assets/release-security-residual-risk.md \
            --overview-output .artifacts/release-assets/release-security-overview.md \
            --notes-fragment-output .artifacts/release-assets/release-security-notes.md \
            --existing-notes .artifacts/release-assets/release-notes-existing.md \
            --release-notes-output .artifacts/release-assets/release-notes-updated.md

      - name: Stage release security assets
        run: |
          mkdir -p .artifacts/release-assets/upload
          cp .artifacts/release-assets/trivy-maintainer-summary.md .artifacts/release-assets/upload/release-security-maintainer-summary.md
          cp .artifacts/release-assets/trivy-maintainer-summary.json .artifacts/release-assets/upload/release-security-maintainer-summary.json
          cp .artifacts/release-assets/sbom-maintainer.spdx.json .artifacts/release-assets/upload/release-security-maintainer-sbom.spdx.json
          cp .artifacts/release-assets/trivy-java-summary.md .artifacts/release-assets/upload/release-security-java-summary.md
          cp .artifacts/release-assets/trivy-java-summary.json .artifacts/release-assets/upload/release-security-java-summary.json
          cp .artifacts/release-assets/sbom-java.spdx.json .artifacts/release-assets/upload/release-security-java-sbom.spdx.json
          cp .artifacts/release-assets/trivy-python-node-summary.md .artifacts/release-assets/upload/release-security-python-node-summary.md
          cp .artifacts/release-assets/trivy-python-node-summary.json .artifacts/release-assets/upload/release-security-python-node-summary.json
          cp .artifacts/release-assets/sbom-python-node.spdx.json .artifacts/release-assets/upload/release-security-python-node-sbom.spdx.json
          cp .artifacts/release-assets/release-security-overview.md .artifacts/release-assets/upload/release-security-overview.md
          cp .artifacts/release-assets/release-security-residual-risk.md .artifacts/release-assets/upload/release-security-residual-risk.md
          cp .artifacts/release-assets/release-security-residual-risk.json .artifacts/release-assets/upload/release-security-residual-risk.json

      - name: Upload release security assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.release-context.outputs.release_tag }}
        run: |
          gh release upload "${TAG_NAME}" .artifacts/release-assets/upload/* --clobber

      - name: Update release notes with security status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.release-context.outputs.release_tag }}
        run: |
          gh release edit "${TAG_NAME}" --notes-file .artifacts/release-assets/release-notes-updated.md

  update-readme-recent-releases:
    runs-on: ubuntu-latest
    needs:
      - release-context
      - publish-release-security
    if: ${{ needs.release-context.outputs.is_full_release == 'true' }}
    steps:
      - name: Check out default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update recent releases table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/update_recent_releases_table.py \
            --repo "${GITHUB_REPOSITORY}" \
            --readme README.md \
            --limit 5

      - name: Commit README update
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- README.md; then
            echo "README.md already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update recent release links in README"
          git push origin "HEAD:${DEFAULT_BRANCH}"
