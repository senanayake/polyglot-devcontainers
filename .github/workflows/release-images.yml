name: release-images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root
            image_name: polyglot-devcontainers-root
            dockerfile: .devcontainer/Containerfile
            context: .
            workdir: /workspaces/polyglot-devcontainers
          - name: python-node
            image_name: polyglot-devcontainers-python-node
            dockerfile: templates/python-node-secure/.devcontainer/Containerfile
            context: .
            workdir: /workspaces/polyglot-devcontainers/templates/python-node-secure

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=main,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build image for validation
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ matrix.image_name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run task ci inside built image
        run: |
          docker run --rm \
            -u root \
            -v "${{ github.workspace }}:/workspaces/polyglot-devcontainers" \
            -w "${{ matrix.workdir }}" \
            "${{ matrix.image_name }}:ci" \
            bash -lc "git config --global --add safe.directory /workspaces/polyglot-devcontainers && task ci"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ matrix.image_name }}:ci
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.sarif

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}@${{ steps.push.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
