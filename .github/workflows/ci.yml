name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build root image
        run: |
          docker build --file .devcontainer/Containerfile --tag polyglot-devcontainers-root:ci .

      - name: Run root workflow
        run: |
          docker run --rm \
            -u root \
            -v "${{ github.workspace }}:/workspaces/polyglot-devcontainers" \
            -w /workspaces/polyglot-devcontainers \
            polyglot-devcontainers-root:ci \
            bash -lc "git config --global --add safe.directory /workspaces/polyglot-devcontainers && task ci"
