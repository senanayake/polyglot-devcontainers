name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build root image
        run: |
          docker build --file .devcontainer/Containerfile --tag polyglot-devcontainers-root:ci .

      - name: Run root workflow
        run: |
          git config --global --add safe.directory /workspaces/polyglot-devcontainers
          task ci
        shell: docker run --rm -u root -v "${{ github.workspace }}:/workspaces/polyglot-devcontainers" -w /workspaces/polyglot-devcontainers polyglot-devcontainers-root:ci bash -lc "{0}"
