name: cut-release

run-name: cut-release ${{ inputs.increment }} from ${{ inputs.target_ref }}

on:
  workflow_dispatch:
    inputs:
      increment:
        description: Semantic version increment to apply to the latest tag
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      target_ref:
        description: Branch, tag, or commit to tag. Default is main.
        required: true
        default: main
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: cut-release
  cancel-in-progress: false

jobs:
  plan-release:
    runs-on: ubuntu-latest
    outputs:
      default_branch: ${{ steps.context.outputs.default_branch }}
      next_tag: ${{ steps.resolve.outputs.next_tag }}
      previous_tag: ${{ steps.resolve.outputs.previous_tag }}
      target_ref: ${{ steps.context.outputs.target_ref }}
      target_sha: ${{ steps.context.outputs.target_sha }}
    steps:
      - name: Check out target ref
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Fetch semantic version tags
        run: git fetch --force --tags origin

      - name: Resolve next release tag
        id: resolve
        env:
          INCREMENT: ${{ inputs.increment }}
        run: |
          set -euo pipefail
          python3 scripts/resolve_next_release_tag.py \
            --increment "${INCREMENT}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Capture release context
        id: context
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TARGET_REF: ${{ inputs.target_ref }}
        run: |
          set -euo pipefail
          next_tag="${{ steps.resolve.outputs.next_tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${next_tag}" >/dev/null 2>&1; then
            echo "Computed next tag already exists on origin: ${next_tag}" >&2
            exit 1
          fi

          target_sha="$(git rev-parse HEAD)"
          echo "default_branch=${DEFAULT_BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "target_ref=${TARGET_REF}" >> "${GITHUB_OUTPUT}"
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"

      - name: Summarize release plan
        env:
          DEFAULT_BRANCH: ${{ steps.context.outputs.default_branch }}
          INCREMENT: ${{ inputs.increment }}
          NEXT_TAG: ${{ steps.resolve.outputs.next_tag }}
          PREVIOUS_TAG: ${{ steps.resolve.outputs.previous_tag }}
          TARGET_REF: ${{ steps.context.outputs.target_ref }}
          TARGET_SHA: ${{ steps.context.outputs.target_sha }}
        run: |
          set -euo pipefail
          {
            echo "### Release tag request"
            echo ""
            if [[ -n "${PREVIOUS_TAG}" ]]; then
              echo "- Previous tag: \`${PREVIOUS_TAG}\`"
            else
              echo "- Previous tag: none"
            fi
            echo "- Increment: \`${INCREMENT}\`"
            echo "- Next tag: \`${NEXT_TAG}\`"
            echo "- Target ref: \`${TARGET_REF}\`"
            echo "- Target commit: \`${TARGET_SHA}\`"
            echo "- Default branch: \`${DEFAULT_BRANCH}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${TARGET_REF}" != "${DEFAULT_BRANCH}" ]]; then
            {
              echo ""
              echo "This run is tagging a ref other than the default branch."
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

  push-release-tag:
    needs: plan-release
    runs-on: ubuntu-latest
    steps:
      - name: Check out target commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.plan-release.outputs.target_sha }}
          fetch-depth: 0

      - name: Create and push annotated tag
        env:
          TARGET_SHA: ${{ needs.plan-release.outputs.target_sha }}
          VERSION: ${{ needs.plan-release.outputs.next_tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag already exists on origin: ${VERSION}" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" "${TARGET_SHA}" -m "Release ${VERSION}"
          git push origin "refs/tags/${VERSION}"

      - name: Summarize pushed tag
        env:
          TARGET_SHA: ${{ needs.plan-release.outputs.target_sha }}
          VERSION: ${{ needs.plan-release.outputs.next_tag }}
        run: |
          set -euo pipefail
          {
            echo "### Release tag pushed"
            echo ""
            echo "- Tag: \`${VERSION}\`"
            echo "- Commit: \`${TARGET_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  run-release-images:
    needs:
      - plan-release
      - push-release-tag
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.plan-release.outputs.target_sha }}
          fetch-depth: 1

      - name: Dispatch full release workflow
        id: dispatch
        env:
          GH_API_URL: ${{ github.api_url }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.plan-release.outputs.next_tag }}
        run: |
          set -euo pipefail
          python3 scripts/dispatch_github_workflow.py \
            --api-url "${GH_API_URL}" \
            --repo "${GH_REPO}" \
            --workflow release-images.yml \
            --ref "${VERSION}" \
            --input "release_mode=full-release" \
            --input "release_tag=${VERSION}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Wait for full release workflow
        id: wait
        env:
          EXPECTED_SHA: ${{ needs.plan-release.outputs.target_sha }}
          GH_API_URL: ${{ github.api_url }}
          GH_REPO: ${{ github.repository }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_AT: ${{ steps.dispatch.outputs.requested_at }}
          VERSION: ${{ needs.plan-release.outputs.next_tag }}
        run: |
          set -euo pipefail
          python3 scripts/wait_for_github_workflow.py \
            --api-url "${GH_API_URL}" \
            --repo "${GH_REPO}" \
            --workflow release-images.yml \
            --head-branch "${VERSION}" \
            --head-sha "${EXPECTED_SHA}" \
            --requested-after "${REQUESTED_AT}" \
            --server-url "${GH_SERVER_URL}" \
            --timeout-seconds 2400 \
            --github-output "${GITHUB_OUTPUT}"

      - name: Summarize downstream release workflow
        env:
          RUN_URL: ${{ steps.wait.outputs.run_url }}
          VERSION: ${{ needs.plan-release.outputs.next_tag }}
        run: |
          set -euo pipefail
          {
            echo "### Full release workflow"
            echo ""
            echo "- Release tag: \`${VERSION}\`"
            echo "- Downstream workflow: ${RUN_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
