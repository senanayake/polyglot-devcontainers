version: "3"

tasks:
  init:
    cmds:
      - mkdir -p .artifacts/scans
      - >
        GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}"
        gradle --no-daemon --write-locks
        testClasses propertyTestClasses integrationTestClasses acceptanceTestClasses

  lint:
    cmds:
      - GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}" gradle --no-daemon spotlessCheck spotbugsMain spotbugsTest

  test:
    desc: Run the full automated test suite
    cmds:
      - >
        GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}"
        gradle --no-daemon test propertyTest integrationTest acceptanceTest

  test:fast:
    desc: Run the fast feedback suite (unit + property)
    cmds:
      - GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}" gradle --no-daemon test propertyTest

  test:unit:
    desc: Run unit tests only
    cmds:
      - GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}" gradle --no-daemon test

  test:integration:
    desc: Run integration tests only
    cmds:
      - GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}" gradle --no-daemon integrationTest

  test:acceptance:
    desc: Run executable specification and BDD tests
    cmds:
      - GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}" gradle --no-daemon acceptanceTest

  test:property:
    desc: Run property-based tests
    cmds:
      - GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}" gradle --no-daemon propertyTest

  test:all:
    desc: Alias for the full automated test suite
    cmds:
      - task test

  scan:
    cmds:
      - mkdir -p .artifacts/scans
      - >
        GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}"
        gradle --no-daemon testClasses propertyTestClasses integrationTestClasses acceptanceTestClasses
      - trivy fs --timeout 15m --scanners vuln --format json --output .artifacts/scans/trivy-java.json .
      - gitleaks dir . --no-banner --redact --report-format sarif --report-path .artifacts/scans/gitleaks.sarif

  deps:inventory:
    cmds:
      - mkdir -p .artifacts/scans
      - >
        jq -Rn
        '[inputs | select(length > 0 and (startswith("#") | not)) | split("=")
        as $parts | ($parts[0]) as $dependency | ($dependency |
        capture("^(?<coordinates>.+):(?<current_version>[^:]+)$")) as $parsed
        | {name: $parsed.coordinates, scope: "locked", specifier: $dependency,
        current_version: $parsed.current_version, configurations: (($parts[1]
        // "") | split(",") | map(select(length > 0)))}] | {ecosystem: "java",
        source: "gradle.lockfile", dependencies: .}'
        gradle.lockfile > .artifacts/scans/dependency-inventory.json

  deps:plan:
    cmds:
      - mkdir -p .artifacts/scans
      - GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}" gradle --no-daemon --no-parallel dependencyUpdates -Drevision=release -DoutputFormatter=json -DoutputDir=.artifacts/scans -DreportfileName=gradle-dependency-updates
      - >
        jq
        'def numeric_parts($value): if $value == null then [] else [$value |
        scan("\\d+") | tonumber] end; def component_at($parts; $index): if
        ($parts | length) > $index then $parts[$index] else 0 end; def
        classify($current; $latest): if $current == null or $latest == null
        then "none" else (numeric_parts($current)) as $c |
        (numeric_parts($latest)) as $l | if component_at($c; 0) !=
        component_at($l; 0) then "major" elif component_at($c; 1) !=
        component_at($l; 1) then "minor" elif component_at($c; 2) !=
        component_at($l; 2) then "patch" elif $current != $latest then
        "variant" else "none" end end; (.outdated.dependencies // []) as
        $outdated | (.outdated.gradle // {}) as $gradle_update | {ecosystem:
        "java", source: "gradle-dependency-updates.json", dependencies:
        [$outdated[]? | (.available.release // .available.milestone //
        .available.integration) as $latest | {name: (.group + ":" + .name),
        scope: "direct", current_version: .version, latest_version: $latest,
        update_type: classify(.version; $latest), will_update: ($latest != null
        and $latest != .version)}], gradle:
        {current_version: (.gradle.current // null), latest_version:
        ($gradle_update.releaseCandidate // $gradle_update.nightly //
        $gradle_update.current // null), update_type:
        classify(.gradle.current;
        ($gradle_update.releaseCandidate // $gradle_update.nightly //
        $gradle_update.current // null)), will_update:
        (($gradle_update.releaseCandidate // $gradle_update.nightly //
        $gradle_update.current // null) != null and (.gradle.current !=
        ($gradle_update.releaseCandidate // $gradle_update.nightly //
        $gradle_update.current // null)))}}'
        .artifacts/scans/gradle-dependency-updates.json >
        .artifacts/scans/dependency-plan.json

  deps:report:
    cmds:
      - task deps:inventory
      - task deps:plan
      - >
        python ../../scripts/dependency_report.py
        --inventory .artifacts/scans/dependency-inventory.json
        --plan .artifacts/scans/dependency-plan.json
        --json-output .artifacts/scans/dependency-report.json
        --markdown-output .artifacts/scans/dependency-report.md

  format:
    cmds:
      - GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}" gradle --no-daemon spotlessApply

  upgrade:
    cmds:
      - task deps:inventory
      - task deps:plan
      - GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}" gradle --no-daemon --no-parallel useLatestVersions -Drevision=release
      - GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}" gradle --no-daemon --no-parallel useLatestVersionsCheck -Drevision=release
      - >
        GRADLE_USER_HOME="${GRADLE_USER_HOME:-.gradle}"
        gradle --no-daemon --write-locks test propertyTest integrationTest acceptanceTest
      - task lint
      - task scan

  ci:
    cmds:
      - task init
      - task lint
      - task test
      - task scan
