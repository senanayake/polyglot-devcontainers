[python_package_audit]
fail_on_severities = ["CRITICAL"]
allow_no_fix_advisories = true

# Add entries like the example below if a critical advisory must be accepted
# temporarily.
#
# [[python_package_audit.accepted_advisories]]
# id = "GHSA-xxxx-xxxx-xxxx"
# reason = "Accepted temporarily while upstream ships a fix."
# expires_on = "2026-04-30"

[python_package_remediation]
allowed_scopes = ["runtime", "dev"]
maximum_update_type = "minor"
allow_exact_pin_updates = true
allow_transitive_parent_remediation = true

[python_package_remediation.pr]
branch_prefix = "codex/scan-remediation"
commit_message = "chore(deps): automate Python CVE remediation"
push_branch = false
open_pull_request = false
base_branch = "main"
pull_request_title = "chore(deps): automated Python CVE remediation"
