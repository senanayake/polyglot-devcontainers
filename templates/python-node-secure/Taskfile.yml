version: "3"

tasks:
  init:
    cmds:
      - python tasks.py init

  lint:
    cmds:
      - python tasks.py lint

  test:
    desc: Run the full automated test suite
    cmds:
      - python tasks.py test

  test:fast:
    desc: Run the fast feedback suite (Python unit + property, Node unit)
    cmds:
      - python tasks.py test_fast

  test:unit:
    desc: Run unit tests only
    cmds:
      - python tasks.py test_unit

  test:integration:
    desc: Run opt-in live integration tests
    cmds:
      - python tasks.py test_integration

  test:acceptance:
    desc: Run executable specification and BDD tests
    cmds:
      - python tasks.py test_acceptance

  test:property:
    desc: Run property-based tests
    cmds:
      - python tasks.py test_property

  test:all:
    desc: Alias for the full automated test suite
    cmds:
      - python tasks.py test_all

  scan:
    cmds:
      - python tasks.py scan

  format:
    cmds:
      - python tasks.py format

  scenarios:starter-health:
    cmds:
      - mkdir -p .artifacts/scenarios
      - >
        python scripts/run_scenario.py
        --scenario scenarios/starter-health.json
        --json-output .artifacts/scenarios/starter-health.json
        --markdown-output .artifacts/scenarios/starter-health.md

  scenarios:security-evidence:
    cmds:
      - mkdir -p .artifacts/scenarios
      - >
        python scripts/run_scenario.py
        --scenario scenarios/security-evidence.json
        --json-output .artifacts/scenarios/security-evidence.json
        --markdown-output .artifacts/scenarios/security-evidence.md

  scenarios:non-git-scan-fallback:
    cmds:
      - mkdir -p .artifacts/scenarios
      - >
        python scripts/run_scenario.py
        --scenario scenarios/non-git-scan-fallback.json
        --json-output .artifacts/scenarios/non-git-scan-fallback.json
        --markdown-output .artifacts/scenarios/non-git-scan-fallback.md

  scenarios:verify:
    cmds:
      - task scenarios:starter-health
      - task scenarios:security-evidence
      - task scenarios:non-git-scan-fallback

  ci:
    desc: Run all starter checks with the fast default test suite
    cmds:
      - task init
      - task lint
      - task test
      - task scan
