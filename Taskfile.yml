version: "3"

tasks:
  maintainer:up:
    desc: Start or reuse the maintainer devcontainer through the official Dev Containers CLI
    cmds:
      - python scripts/run_in_maintainer_container.py up

  maintainer:pull:
    desc: Deprecated alias for task maintainer:up
    cmds:
      - task maintainer:up

  maintainer:shell:
    desc: Open an interactive shell inside the maintainer devcontainer
    deps: [maintainer:up]
    cmds:
      - python scripts/run_in_maintainer_container.py shell

  maintainer:task:
    desc: Run a repository task inside the maintainer devcontainer, e.g. task maintainer:task -- ci
    deps: [maintainer:up]
    cmds:
      - python scripts/run_in_maintainer_container.py exec -- task {{.CLI_ARGS}}

  maintainer:git:
    desc: Run git inside the maintainer devcontainer, e.g. task maintainer:git -- status --short --branch
    deps: [maintainer:up]
    cmds:
      - python scripts/run_in_maintainer_container.py git -- {{.CLI_ARGS}}

  maintainer:gh:
    desc: Run gh inside the maintainer devcontainer, e.g. task maintainer:gh -- run view 123456789
    deps: [maintainer:up]
    cmds:
      - python scripts/run_in_maintainer_container.py gh -- {{.CLI_ARGS}}

  _require_maintainer:
    internal: true
    cmds:
      - python scripts/require_maintainer_container.py

  _require_image_runtime:
    internal: true
    cmds:
      - bash scripts/start_docker_daemon.sh
      - python scripts/require_maintainer_container.py --require-oci-runtime

  init:
    desc: Bootstrap the maintained repository environments
    deps: [_require_maintainer]
    cmds:
      - python examples/python-example/tasks.py init
      - task -t examples/python-image-example/Taskfile.yml init
      - task -t examples/diagram-image-example/Taskfile.yml init
      - task -t examples/java-image-example/Taskfile.yml init
      - task -t templates/python-secure/Taskfile.yml init
      - task -t templates/node-secure/Taskfile.yml init
      - task -t templates/diagram-secure/Taskfile.yml init
      - task -t templates/python-node-secure/Taskfile.yml init
      - task -t templates/java-secure/Taskfile.yml init

  init:feature:
    desc: Scaffold a new repository-owned OCI devcontainer feature
    deps: [_require_maintainer]
    cmds:
      - python scripts/scaffold_feature.py {{range .CLI_ARGS_LIST}}{{. | q}} {{end}}

  init-feature:
    desc: Alias for task init:feature
    deps: [_require_maintainer]
    cmds:
      - task init:feature -- {{.CLI_ARGS}}

  init:adr:
    desc: Scaffold a new architecture decision record
    deps: [_require_maintainer]
    cmds:
      - python scripts/scaffold_adr.py {{range .CLI_ARGS_LIST}}{{. | q}} {{end}}

  init-adr:
    desc: Alias for task init:adr
    deps: [_require_maintainer]
    cmds:
      - task init:adr -- {{.CLI_ARGS}}

  lint:
    desc: Run repository quality checks across maintained environments
    deps: [_require_maintainer]
    cmds:
      - python examples/python-example/tasks.py lint
      - task -t examples/python-image-example/Taskfile.yml lint
      - task -t examples/diagram-image-example/Taskfile.yml lint
      - task -t examples/java-image-example/Taskfile.yml lint
      - task -t templates/python-secure/Taskfile.yml lint
      - task -t templates/node-secure/Taskfile.yml lint
      - task -t templates/diagram-secure/Taskfile.yml lint
      - task -t templates/python-node-secure/Taskfile.yml lint
      - task -t templates/java-secure/Taskfile.yml lint

  test:
    desc: Run automated tests across maintained environments
    deps: [_require_maintainer]
    cmds:
      - python examples/python-example/tasks.py test
      - task -t examples/python-image-example/Taskfile.yml test
      - task -t examples/diagram-image-example/Taskfile.yml test
      - task -t examples/java-image-example/Taskfile.yml test
      - task -t templates/python-secure/Taskfile.yml test
      - task -t templates/node-secure/Taskfile.yml test
      - task -t templates/diagram-secure/Taskfile.yml test
      - task -t templates/python-node-secure/Taskfile.yml test
      - task -t templates/java-secure/Taskfile.yml test

  scan:
    desc: Run security checks and write root scan artifacts
    deps: [_require_maintainer]
    cmds:
      - mkdir -p .artifacts/scans
      - python examples/python-example/tasks.py scan
      - task -t examples/python-image-example/Taskfile.yml scan
      - task -t examples/diagram-image-example/Taskfile.yml scan
      - task -t examples/java-image-example/Taskfile.yml scan
      - task -t templates/python-secure/Taskfile.yml scan
      - task -t templates/node-secure/Taskfile.yml scan
      - task -t templates/diagram-secure/Taskfile.yml scan
      - task -t templates/python-node-secure/Taskfile.yml scan
      - task -t templates/java-secure/Taskfile.yml scan
      - gitleaks git . --no-banner --redact --report-format sarif --report-path .artifacts/scans/gitleaks.sarif

  format:
    desc: Format repository-owned Python and Node template sources
    deps: [_require_maintainer]
    cmds:
      - python examples/python-example/tasks.py format
      - task -t examples/python-image-example/Taskfile.yml format
      - task -t examples/diagram-image-example/Taskfile.yml format
      - task -t templates/python-secure/Taskfile.yml format
      - task -t templates/node-secure/Taskfile.yml format
      - task -t templates/diagram-secure/Taskfile.yml format
      - task -t templates/python-node-secure/Taskfile.yml format

  deps:report:
    desc: Build dependency summary reports across the Python and Java proving paths
    deps: [_require_maintainer]
    cmds:
      - mkdir -p .artifacts/scans
      - task -t examples/python-image-example/Taskfile.yml deps:report
      - task -t examples/python-maintenance-example/Taskfile.yml deps:report
      - task -t templates/python-secure/Taskfile.yml deps:report
      - task -t examples/java-image-example/Taskfile.yml deps:report
      - task -t examples/java-maintenance-example/Taskfile.yml deps:report
      - task -t templates/java-secure/Taskfile.yml deps:report
      - >
        python scripts/repository_dependency_report.py
        --json-output .artifacts/scans/dependency-report.json
        --markdown-output .artifacts/scans/dependency-report.md
        examples/python-image-example/.artifacts/scans/dependency-report.json
        examples/python-maintenance-example/.artifacts/scans/dependency-report.json
        templates/python-secure/.artifacts/scans/dependency-report.json
        examples/java-image-example/.artifacts/scans/dependency-report.json
        examples/java-maintenance-example/.artifacts/scans/dependency-report.json
        templates/java-secure/.artifacts/scans/dependency-report.json

  starters:list:
    desc: List experimental starter catalog entries
    deps: [_require_maintainer]
    cmds:
      - python scripts/starter_catalog.py list

  starters:validate:
    desc: Validate the experimental starter catalog contract
    deps: [_require_maintainer]
    cmds:
      - python scripts/starter_catalog.py validate

  starters:release:export:
    desc: Export a released starter catalog snapshot for the hosted public derivative
    deps: [_require_maintainer]
    cmds:
      - python scripts/starter_catalog.py export-release {{.CLI_ARGS}}

  starters:validate:public:
    desc: Validate the hardened public starter API contract from a released catalog snapshot
    deps: [_require_maintainer]
    cmds:
      - python scripts/validate_public_starter_api.py

  starters:show:
    desc: Show one experimental starter catalog entry as JSON
    deps: [_require_maintainer]
    cmds:
      - python scripts/starter_catalog.py show {{.CLI_ARGS}}

  starters:generate:
    desc: Generate a source-complete starter from the experimental catalog
    deps: [_require_maintainer]
    cmds:
      - python scripts/starter_catalog.py generate {{.CLI_ARGS}}

  starters:serve:
    desc: Start the local starter catalog service and minimal web UI on the host
    cmds:
      - python scripts/starter_site.py {{.CLI_ARGS}}

  starters:site:start:
    desc: Start the local starter catalog service and minimal web UI in the background on the host
    cmds:
      - python scripts/manage_starter_site.py start {{.CLI_ARGS}}

  starters:site:stop:
    desc: Stop the managed local starter catalog service on the host
    cmds:
      - python scripts/manage_starter_site.py stop {{.CLI_ARGS}}

  starters:site:status:
    desc: Show the managed local starter catalog service status on the host
    cmds:
      - python scripts/manage_starter_site.py status {{.CLI_ARGS}}

  starters:prove:
    desc: Generate and prove one or more starters from the experimental catalog
    deps: [_require_maintainer]
    cmds:
      - python scripts/starter_catalog.py prove {{.CLI_ARGS}}

  starters:verify:source:
    desc: Validate the starter catalog and prove the source-template starter paths
    deps: [_require_maintainer]
    cmds:
      - task starters:validate
      - task starters:validate:public
      - task starters:prove -- --all

  starters:verify:
    desc: Validate all starter paths, including published-image bootstrap proofs
    deps: [_require_maintainer]
    cmds:
      - task starters:verify:source
      - task starters:verify:image-backed -- --profile medium

  starters:verify:image-backed:
    desc: Prove the published-image bootstrap path for selected starter-backed images
    deps: [_require_image_runtime]
    cmds:
      - python scripts/published_image_pipeline.py starter-proof {{.CLI_ARGS}}

  scan:auto:fixtures:
    desc: Materialize and validate the Python scan:auto fixture matrix
    deps: [_require_maintainer]
    cmds:
      - mkdir -p .artifacts/scans
      - python scripts/run_python_scan_auto_fixtures.py

  scenarios:python-maintenance:
    desc: Run the Python dependency-maintenance scenario and write scenario artifacts
    deps: [_require_maintainer]
    cmds:
      - mkdir -p .artifacts/scenarios
      - >
        python scripts/run_scenario.py
        --scenario scenarios/dependency-maintenance/python-uv-lock-maintenance.json
        --json-output .artifacts/scenarios/python-uv-lock-maintenance.json
        --markdown-output .artifacts/scenarios/python-uv-lock-maintenance.md

  scenarios:python-audit-policy:
    desc: Run the Python audit-policy scenario and write scenario artifacts
    deps: [_require_maintainer]
    cmds:
      - mkdir -p .artifacts/scenarios
      - >
        python scripts/run_scenario.py
        --scenario scenarios/security-policy/python-audit-policy.json
        --json-output .artifacts/scenarios/python-audit-policy.json
        --markdown-output .artifacts/scenarios/python-audit-policy.md

  scenarios:java-maintenance:
    desc: Run the Java dependency-maintenance scenario and write scenario artifacts
    deps: [_require_maintainer]
    cmds:
      - mkdir -p .artifacts/scenarios
      - >
        python scripts/run_scenario.py
        --scenario scenarios/dependency-maintenance/java-gradle-maintenance.json
        --json-output .artifacts/scenarios/java-gradle-maintenance.json
        --markdown-output .artifacts/scenarios/java-gradle-maintenance.md

  scenarios:java-openrewrite:
    desc: Validate the non-mutating OpenRewrite dry-run proof and write scenario artifacts
    deps: [_require_maintainer]
    cmds:
      - mkdir -p .artifacts/scenarios
      - bash scripts/validate_openrewrite_dry_run.sh

  scenarios:podman-devpod-macos:
    desc: Run the Podman+DevPod macOS setup scenario (host-side execution, macOS only)
    cmds:
      - |
        if [[ "$(uname)" == "Darwin" ]]; then
          mkdir -p .artifacts/scenarios
          bash scripts/setup/setup-podman-devpod-macos.sh --dry-run
          echo "Note: This scenario must be run on the macOS host, not inside a container"
          echo "To execute: bash scripts/setup/setup-podman-devpod-macos.sh"
        else
          echo "Skipping Podman+DevPod macOS scenario: requires macOS (detected: $(uname))"
        fi

  scenarios:verify:
    desc: Run the current repo-owned scenario proving set
    deps: [_require_maintainer]
    cmds:
      - task scenarios:python-maintenance
      - task scenarios:python-audit-policy
      - task scenarios:java-maintenance
      - task scenarios:java-openrewrite

  image:discover:
    desc: Resolve upstream digests for published image base references
    deps: [_require_maintainer]
    cmds:
      - mkdir -p .artifacts/scans
      - >
        python scripts/update_base_image_pins.py
        --json-output .artifacts/scans/base-image-report.json
        --markdown-output .artifacts/scans/base-image-report.md
        {{.CLI_ARGS}}

  image:pin:
    desc: Update published image base references when invoked with task image:pin -- --write
    deps: [_require_maintainer]
    cmds:
      - mkdir -p .artifacts/scans
      - >
        python scripts/update_base_image_pins.py
        --json-output .artifacts/scans/base-image-report.json
        --markdown-output .artifacts/scans/base-image-report.md
        {{.CLI_ARGS}}

  image:list:
    desc: List published image targets and their default validation lanes
    deps: [_require_maintainer]
    cmds:
      - python scripts/published_image_pipeline.py list

  image:build:
    desc: Build one or more published images with optional slow validation steps
    deps: [_require_image_runtime]
    cmds:
      - python scripts/published_image_pipeline.py build {{.CLI_ARGS}}

  image:verify:
    desc: Run the full-release published-image validation profile across selected targets
    deps: [_require_image_runtime]
    cmds:
      - task image:discover -- --check-pinned
      - python scripts/published_image_pipeline.py build --profile full-release {{.CLI_ARGS}}

  image:scan:
    desc: Scan saved published-image tar artifacts for selected targets
    deps: [_require_image_runtime]
    cmds:
      - python scripts/published_image_pipeline.py scan {{.CLI_ARGS}}

  image:maintain:
    desc: Apply published image base pin updates, then verify and scan the refreshed images
    deps: [_require_image_runtime]
    cmds:
      - mkdir -p .artifacts/scans
      - >
        python scripts/update_base_image_pins.py
        --json-output .artifacts/scans/base-image-report.json
        --markdown-output .artifacts/scans/base-image-report.md
        --write
      - task image:verify
      - task image:scan

  ci:repo-core:
    desc: Run the core repository lane without published-image bootstrap proofs
    deps: [_require_maintainer]
    cmds:
      - task init
      - task lint
      - task test
      - task scan
      - task scan:auto:fixtures
      - task scenarios:verify
      - task starters:verify:source

  ci:fast:
    desc: Deprecated alias for task ci:repo-core
    deps: [_require_maintainer]
    cmds:
      - task ci:repo-core

  ci:medium:
    desc: Run the default PR lane with medium-profile published-image starter proofs
    deps: [_require_maintainer]
    cmds:
      - task ci:repo-core
      - task starters:verify:image-backed -- --profile medium

  ci:full-release:
    desc: Run the full release-validation lane, including all image builds and scans
    deps: [_require_maintainer]
    cmds:
      - task ci:medium
      - task image:verify
      - task image:scan

  ci:
    desc: Run the default free-tier repository workflow
    deps: [_require_maintainer]
    cmds:
      - task ci:medium
