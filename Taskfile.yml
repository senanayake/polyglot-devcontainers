version: "3"

tasks:
  init:
    desc: Bootstrap the maintained repository environments
    cmds:
      - python examples/python-example/tasks.py init
      - task -t examples/python-image-example/Taskfile.yml init
      - task -t examples/java-image-example/Taskfile.yml init
      - task -t templates/python-secure/Taskfile.yml init
      - task -t templates/node-secure/Taskfile.yml init
      - task -t templates/python-node-secure/Taskfile.yml init
      - task -t templates/java-secure/Taskfile.yml init

  lint:
    desc: Run repository quality checks across maintained environments
    cmds:
      - python examples/python-example/tasks.py lint
      - task -t examples/python-image-example/Taskfile.yml lint
      - task -t examples/java-image-example/Taskfile.yml lint
      - task -t templates/python-secure/Taskfile.yml lint
      - task -t templates/node-secure/Taskfile.yml lint
      - task -t templates/python-node-secure/Taskfile.yml lint
      - task -t templates/java-secure/Taskfile.yml lint

  test:
    desc: Run automated tests across maintained environments
    cmds:
      - python examples/python-example/tasks.py test
      - task -t examples/python-image-example/Taskfile.yml test
      - task -t examples/java-image-example/Taskfile.yml test
      - task -t templates/python-secure/Taskfile.yml test
      - task -t templates/node-secure/Taskfile.yml test
      - task -t templates/python-node-secure/Taskfile.yml test
      - task -t templates/java-secure/Taskfile.yml test

  scan:
    desc: Run security checks and write root scan artifacts
    cmds:
      - mkdir -p .artifacts/scans
      - python examples/python-example/tasks.py scan
      - task -t examples/python-image-example/Taskfile.yml scan
      - task -t examples/java-image-example/Taskfile.yml scan
      - task -t templates/python-secure/Taskfile.yml scan
      - task -t templates/node-secure/Taskfile.yml scan
      - task -t templates/python-node-secure/Taskfile.yml scan
      - task -t templates/java-secure/Taskfile.yml scan
      - gitleaks git . --no-banner --redact --report-format sarif --report-path .artifacts/scans/gitleaks.sarif

  format:
    desc: Format repository-owned Python and Node template sources
    cmds:
      - python examples/python-example/tasks.py format
      - task -t examples/python-image-example/Taskfile.yml format
      - task -t templates/python-secure/Taskfile.yml format
      - task -t templates/node-secure/Taskfile.yml format
      - task -t templates/python-node-secure/Taskfile.yml format

  deps:report:
    desc: Build dependency summary reports across the Python and Java proving paths
    cmds:
      - mkdir -p .artifacts/scans
      - task -t examples/python-image-example/Taskfile.yml deps:report
      - task -t examples/python-maintenance-example/Taskfile.yml deps:report
      - task -t templates/python-secure/Taskfile.yml deps:report
      - task -t examples/java-image-example/Taskfile.yml deps:report
      - task -t examples/java-maintenance-example/Taskfile.yml deps:report
      - task -t templates/java-secure/Taskfile.yml deps:report
      - >
        python scripts/repository_dependency_report.py
        --json-output .artifacts/scans/dependency-report.json
        --markdown-output .artifacts/scans/dependency-report.md
        examples/python-image-example/.artifacts/scans/dependency-report.json
        examples/python-maintenance-example/.artifacts/scans/dependency-report.json
        templates/python-secure/.artifacts/scans/dependency-report.json
        examples/java-image-example/.artifacts/scans/dependency-report.json
        examples/java-maintenance-example/.artifacts/scans/dependency-report.json
        templates/java-secure/.artifacts/scans/dependency-report.json

  ci:
    desc: Run the full repository workflow across maintained environments
    cmds:
      - task init
      - task lint
      - task test
      - task scan
