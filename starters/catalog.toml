schema_version = 1

[starters.python-secure]
title = "Python Secure Starter"
description = "Minimal secure Python starter with a source-complete template path."
language = "python"
source_template = "templates/python-secure"
generation_modes = ["source-template"]
default_generation_mode = "source-template"
published_image_bootstrap_supported = false
runtime_guidance = ["polyglot", "polyglot-starters", "polyglot-python", "polyglot-security"]
task_contract = ["init", "lint", "test", "scan", "ci"]
features = ["security-baseline", "python-engineering", "agent-runtime"]
scenarios = []
default_profile = "baseline"
proof_commands = ["task ci"]
proof_paths = [
  ".polyglot-starter.json",
  "Taskfile.yml",
  "README.md",
  ".venv",
  ".artifacts/scans/pip-audit-policy.json",
]

[starters.python-secure.composition_profiles.baseline]
description = "Baseline secure Python workspace with the default task contract."
features = ["security-baseline", "python-engineering", "agent-runtime"]
scenarios = []

[starters.python-node-secure]
title = "Python And Node Secure Starter"
description = "Polyglot Python plus Node starter with source-complete generation and starter-local scenarios."
language = "python-node"
source_template = "templates/python-node-secure"
default_generation_mode = "source-template"
published_image = "ghcr.io/senanayake/polyglot-devcontainers-python-node:main"
published_image_bootstrap_supported = true
generation_modes = ["source-template", "published-image-bootstrap"]
runtime_guidance = ["polyglot", "polyglot-starters", "polyglot-python", "polyglot-security"]
task_contract = ["init", "lint", "test", "scan", "ci"]
features = ["security-baseline", "python-engineering", "node-engineering", "agent-runtime"]
scenarios = ["starter-health", "security-evidence", "non-git-scan-fallback"]
default_profile = "polyglot-default"
proof_commands = ["task ci"]
proof_paths = [
  ".polyglot-starter.json",
  "Taskfile.yml",
  "README.md",
  ".venv",
  "node_modules",
  ".artifacts/scans/pip-audit-policy.json",
  ".artifacts/scans/pnpm-audit.json",
  ".artifacts/scenarios/starter-health.json",
  ".artifacts/scenarios/security-evidence.json",
  ".artifacts/scenarios/non-git-scan-fallback.json",
]

[starters.python-node-secure.composition_profiles.polyglot-default]
description = "Default polyglot workspace with Python, Node, and starter-local scenario coverage."
features = ["security-baseline", "python-engineering", "node-engineering", "agent-runtime"]
scenarios = ["starter-health", "security-evidence", "non-git-scan-fallback"]
proof_scenarios = ["starter-health", "security-evidence", "non-git-scan-fallback"]

